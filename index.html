<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Casino Edge Companion</title>
  <meta name="description" content="Offline casino strategy trainers and odds references: blackjack, video poker, craps, roulette, baccarat." />
  <script>
    try {
      var t = localStorage.getItem("casinoedge.theme");
      document.documentElement.dataset.theme = ["neon", "dark", "playful"].indexOf(t) >= 0 ? t : "neon";
    } catch (e) {
      document.documentElement.dataset.theme = "neon";
    }
  </script>
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0d0b1e" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
  <link rel="icon" href="icons/icon-192.png" />
</head>
<body>
  <div class="topbar">
    <h1><span class="brand">Casino Edge Companion</span></h1>
    <div class="theme-switch">
      <label for="theme" class="hint">Theme</label>
      <select id="theme" class="btn"></select>
    </div>
  </div>
  <main>
    <noscript><p class="disclaimer">This app needs JavaScript to run. Reminder: these tools reduce the house edge — they do not beat the house. Gamble responsibly. 1-800-GAMBLER.</p></noscript>
    <p class="lead">Trainers and quick references for the games on the floor. Learn the right play, know the real odds — then lose slower. Works fully offline.</p>
    <div class="grid" id="grid"></div>
    <div class="hub-actions">
      <a class="btn ghost" href="https://sleeprived.github.io/squinks-arcade/">🕹️ Squinks Arcade</a>
      <button class="btn danger" id="reset-all">Reset all saved progress</button>
    </div>
  </main>
  <script type="module" src="js/hub.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>

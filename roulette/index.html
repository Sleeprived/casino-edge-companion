<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Roulette — Casino Edge Companion</title>
  <script>
    try {
      var t = localStorage.getItem("casinoedge.theme");
      document.documentElement.dataset.theme = ["neon", "dark", "playful"].indexOf(t) >= 0 ? t : "neon";
    } catch (e) { document.documentElement.dataset.theme = "neon"; }
  </script>
  <link rel="stylesheet" href="../css/themes.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#0d0b1e" />
  <link rel="icon" href="../icons/icon-192.png" />
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html" aria-label="Back to hub">‹</a>
    <h1><span class="brand">Roulette</span></h1>
    <div class="theme-switch">
      <label for="theme" class="hint">Theme</label>
      <select id="theme" class="btn"></select>
    </div>
  </div>
  <main>
    <div class="tool-wrap">
      <div class="panel">
        <h2>The one rule that matters</h2>
        <p class="lead">Always play a <strong>European</strong> (single-zero) wheel. It cuts the house edge from <span class="edge-bad">5.26%</span> to <span class="edge-good">2.70%</span> on the same bets. Where "la partage" is offered, even-money bets drop to just <span class="edge-good">1.35%</span>.</p>
      </div>
      <div class="panel">
        <h2>American wheel — 0 and 00 (38 pockets)</h2>
        <table class="ref" id="american"></table>
      </div>
      <div class="panel">
        <h2>European wheel — single 0 (37 pockets)</h2>
        <table class="ref" id="european"></table>
      </div>
    </div>
  </main>
  <script type="module" src="../js/ui/roulette.js"></script>
</body>
</html>

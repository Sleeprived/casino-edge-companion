<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Blackjack Trainer — Casino Edge Companion</title>
  <script>
    try {
      var t = localStorage.getItem("casinoedge.theme");
      document.documentElement.dataset.theme = ["neon", "dark", "playful"].indexOf(t) >= 0 ? t : "neon";
    } catch (e) { document.documentElement.dataset.theme = "neon"; }
  </script>
  <link rel="stylesheet" href="../css/themes.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#0d0b1e" />
  <link rel="icon" href="../icons/icon-192.png" />
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html" aria-label="Back to hub">‹</a>
    <h1><span class="brand">Blackjack Trainer</span></h1>
    <div class="theme-switch">
      <label for="theme" class="hint">Theme</label>
      <select id="theme" class="btn"></select>
    </div>
  </div>
  <main>
    <noscript><p class="disclaimer">This app needs JavaScript to run. Reminder: these tools reduce the house edge — they do not beat the house. Gamble responsibly. 1-800-GAMBLER.</p></noscript>
    <div class="tool-wrap">
      <div class="panel">
        <div class="row">
          <label class="hint">Table rules</label>
          <select id="preset" class="btn"></select>
        </div>
        <p class="hint" id="presetnote"></p>
      </div>

      <div class="panel">
        <div class="hint">Dealer shows</div>
        <div class="cardrow" id="dealer"></div>
        <div class="hint" style="margin-top:0.6rem">Your hand</div>
        <div class="cardrow" id="player"></div>
        <div class="msg" id="handlabel"></div>

        <div class="controls" id="actions">
          <button class="btn" data-a="H">Hit</button>
          <button class="btn" data-a="S">Stand</button>
          <button class="btn" data-a="D">Double</button>
          <button class="btn" data-a="P">Split</button>
          <button class="btn" data-a="R">Surrender</button>
        </div>
        <div class="msg" id="feedback"></div>
        <div class="row"><button class="btn accent" id="next">Next hand ›</button></div>
      </div>

      <div class="panel">
        <div class="scorebar">
          <span>Accuracy <span id="acc">0%</span></span>
          <span class="muted">Streak <span id="streak">0</span></span>
          <span class="muted">Best <span id="best">0</span></span>
          <span class="muted">Hands <span id="hands">0</span></span>
        </div>
        <div class="row">
          <button class="btn ghost" id="togglechart">Show strategy chart</button>
          <button class="btn ghost" id="reset">Reset this preset's score</button>
        </div>
        <div id="chart" class="hidden"></div>
      </div>
    </div>
  </main>
  <script type="module" src="../js/ui/blackjack.js"></script>
</body>
</html>

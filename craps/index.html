<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Craps — Casino Edge Companion</title>
  <script>
    try {
      var t = localStorage.getItem("casinoedge.theme");
      document.documentElement.dataset.theme = ["neon", "dark", "playful"].indexOf(t) >= 0 ? t : "neon";
    } catch (e) { document.documentElement.dataset.theme = "neon"; }
  </script>
  <link rel="stylesheet" href="../css/themes.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#0d0b1e" />
  <link rel="icon" href="../icons/icon-192.png" />
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html" aria-label="Back to hub">‹</a>
    <h1><span class="brand">Craps</span></h1>
    <div class="theme-switch">
      <label for="theme" class="hint">Theme</label>
      <select id="theme" class="btn"></select>
    </div>
  </div>
  <main>
    <noscript><p class="disclaimer">This app needs JavaScript to run. Reminder: these tools reduce the house edge — they do not beat the house. Gamble responsibly. 1-800-GAMBLER.</p></noscript>
    <div class="tool-wrap">
      <div class="panel howto" id="howto" data-game="craps"></div>
      <div class="panel">
        <h2>Sucker-bet quiz</h2>
        <p class="hint">A bet is a "sucker bet" when its house edge is 5% or more.</p>
        <div class="msg" id="quiz-bet"></div>
        <div class="controls">
          <button class="btn accent big" id="smart">Smart bet</button>
          <button class="btn danger big" id="sucker">Sucker bet</button>
        </div>
        <div class="msg" id="quiz-feedback"></div>
        <div class="scorebar">
          <span>Accuracy <span id="acc">0%</span></span>
          <span class="muted">Streak <span id="streak">0</span></span>
          <span class="muted">Best <span id="best">0</span></span>
        </div>
        <div class="row"><button class="btn ghost" id="reset">Reset quiz score</button></div>
      </div>

      <div class="panel">
        <h2>Every craps bet</h2>
        <p class="hint">Tap the House Edge header to flip the sort. Red = sucker bet.</p>
        <table class="ref" id="table"></table>
      </div>
    </div>
  </main>
  <script type="module" src="../js/ui/craps.js"></script>
  <script type="module" src="../js/ui/howto.js"></script>
</body>
</html>

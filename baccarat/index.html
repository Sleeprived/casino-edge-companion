<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Baccarat — Casino Edge Companion</title>
  <script>
    try {
      var t = localStorage.getItem("casinoedge.theme");
      document.documentElement.dataset.theme = ["neon", "dark", "playful"].indexOf(t) >= 0 ? t : "neon";
    } catch (e) { document.documentElement.dataset.theme = "neon"; }
  </script>
  <link rel="stylesheet" href="../css/themes.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#0d0b1e" />
  <link rel="icon" href="../icons/icon-192.png" />
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html" aria-label="Back to hub">‹</a>
    <h1><span class="brand">Baccarat</span></h1>
    <div class="theme-switch">
      <label for="theme" class="hint">Theme</label>
      <select id="theme" class="btn"></select>
    </div>
  </div>
  <main>
    <noscript><p class="disclaimer">This app needs JavaScript to run. Reminder: these tools reduce the house edge — they do not beat the house. Gamble responsibly. 1-800-GAMBLER.</p></noscript>
    <div class="tool-wrap">
      <div class="panel howto" id="howto" data-game="baccarat"></div>
      <div class="panel">
        <h2>The whole strategy</h2>
        <p class="lead">Bet <strong>Banker</strong> every hand. At <span class="edge-good">1.06%</span> it is the best bet on the table even after the 5% commission. Never bet the <span class="edge-bad">Tie</span>.</p>
      </div>
      <div class="panel">
        <h2>The bets</h2>
        <table class="ref" id="table"></table>
      </div>
      <div class="panel" id="notes"></div>
    </div>
  </main>
  <script type="module" src="../js/ui/baccarat.js"></script>
  <script type="module" src="../js/ui/howto.js"></script>
</body>
</html>
